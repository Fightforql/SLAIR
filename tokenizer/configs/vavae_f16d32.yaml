ckpt_path: /openbayes/input/input0/psnr=25.83-v9.ckpt
# ckpt_path: /openbayes/input/input0/vavae-imagenet256-f16d32-dinov2.pt

model:
  base_learning_rate: 1.0e-04
  target: vavae.ldm.models.autoencoder.AutoencoderKL
  params:
    monitor: val/rec_loss
    embed_dim: 32
    use_lora: true
    lora_rank: 16
    lora_alpha: 32
    lora_dropout: 0.0
    #use_vf: dinov2
    #reverse_proj: true
    lossconfig:
      target: vavae.ldm.modules.losses.LPIPSWithDiscriminator
      params:
        disc_start: 5001
        disc_weight: 0.5
        # hyper-param for vision foundation model alignment
        # --------------------------------------------------
        kl_weight: 0.000001
        cls_weight: 0.01

    ddconfig:
      double_z: true
      z_channels: 32
      resolution: 256
      in_channels: 3
      out_ch: 3
      ch: 128
      ch_mult:
      - 1
      - 1
      - 2
      - 2
      - 4
      num_res_blocks: 2
      attn_resolutions:
      - 16
      dropout: 0.0